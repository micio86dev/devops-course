#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - nfs-common
  - netcat-openbsd

runcmd:
  # Install Docker via apt (more reliable than curl|sh in cloud-init:
  # the get.docker.com script uses apt internally and can hit dpkg locks
  # left behind by the package_upgrade phase above)
  - apt-get install -y docker.io docker-compose-v2
  - systemctl enable --now docker

  # NFS mount for shared SQLite volume
  - mkdir -p /mnt/todo-data
  # Wait for the NFS server's TCP port to be open (server cloud-init may
  # still be running package_upgrade)
  - |
    for i in $(seq 1 60); do
      nc -z ${db_private_ip} 2049 && break
      echo "Waiting for NFS server (attempt $i/60)..."
      sleep 5
    done
  # Add fstab entry first so we can `mount /mnt/todo-data` and rely on
  # _netdev for proper ordering on reboot
  - echo "${db_private_ip}:/srv/todo-data /mnt/todo-data nfs defaults,_netdev,nofail 0 0" >> /etc/fstab
  # Retry the mount: even after port 2049 opens the export may not be
  # ready for ~30s while the kernel server initialises
  - |
    for i in $(seq 1 12); do
      mount /mnt/todo-data && break
      echo "NFS mount attempt $i/12 failed, retrying in 10s..."
      sleep 10
    done
  - mountpoint -q /mnt/todo-data || echo "WARN: NFS still not mounted after retries"
  # Create deployment directory — CI/CD expects ~/docker-todo to exist
  - mkdir -p /root/docker-todo

  # Write Valkey URI so CI/CD can source it for REDIS_URL injection
  # File is root-only (600): contains credentials, never world-readable
  - echo "REDIS_URL=${cache_uri}" > /root/docker-todo/.env.valkey
  - chmod 600 /root/docker-todo/.env.valkey
