#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - nfs-common
  - netcat-openbsd

runcmd:
  # Install Docker via apt (more reliable than curl|sh in cloud-init:
  # the get.docker.com script uses apt internally and can hit dpkg locks
  # left behind by the package_upgrade phase above)
  - apt-get install -y docker.io docker-compose-v2
  - systemctl enable --now docker

  # NFS mount for shared SQLite volume
  - mkdir -p /mnt/todo-data
  - |
    for i in $(seq 1 60); do
      nc -z ${db_private_ip} 2049 && break
      echo "Waiting for NFS server (attempt $i/60)..."
      sleep 5
    done
  - mount -t nfs ${db_private_ip}:/srv/todo-data /mnt/todo-data || echo "NFS mount failed, continuing"
  - echo "${db_private_ip}:/srv/todo-data /mnt/todo-data nfs defaults 0 0" >> /etc/fstab

  # Create deployment directory — CI/CD expects ~/docker-todo to exist
  - mkdir -p /root/docker-todo

  # Write Valkey URI so CI/CD can source it for REDIS_URL injection
  # File is root-only (600): contains credentials, never world-readable
  - echo "REDIS_URL=${cache_uri}" > /root/docker-todo/.env.valkey
  - chmod 600 /root/docker-todo/.env.valkey
