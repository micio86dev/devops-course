# .github/workflows/ci-cd.yml
#
# Pipeline CI/CD completa per Docker.
# Trigger:
#   • Push su main/master   → build + test + push immagine + deploy
#   • Pull Request su main  → solo build + test (no push, no deploy)
#
# Secret necessari nel repo GitHub:
#   • DEPLOY_HOST     — IP o hostname del server di produzione
#   • DEPLOY_USER     — utente SSH (es. ubuntu)
#   • DEPLOY_SSH_KEY  — chiave privata SSH (PEM) per accedere al server

name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Permessi necessari per scrivere su GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/docker-todo

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — lint & test
  # Gira su ogni push e ogni PR.
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt -r requirements-test.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check app/

      - name: Run full test suite with coverage enforcement
        env:
          DATABASE_PATH: /tmp/test.db
        run: pytest --cov-fail-under=100

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — build & push dell'immagine Docker
  # Gira solo su push a main (non su PR).
  # ──────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'   # ← skip sulle PR

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Imposta QEMU per build multi-arch (arm64 + amd64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx: il builder avanzato di Docker (multi-arch, cache, ecc.)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login su GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # token automatico, nessun secret manuale

      # Genera tag e labels automatici:
      #   • :latest   su ogni push a main
      #   • :sha-XXXXX  (primo commit SHA)
      #   • :v1.2.3   se esiste un tag Git
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      # Build multi-arch e push su GHCR
      # Il cache da/verso GHCR evita di ricompilare layer non modificati
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — deploy su server di produzione via SSH
  # Gira solo dopo build-push riuscito.
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production    # richiede approvazione manuale se configurato

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            # Vai nella directory del progetto sul server
            cd ~/docker-todo

            # Scarica l'immagine aggiornata dal registry
            docker pull ghcr.io/${{ github.repository }}/docker-todo:latest

            # Riavvia con zero downtime (rolling update)
            IMAGE_TAG=latest \
            GITHUB_REPOSITORY=${{ github.repository }} \
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --no-build

            # Rimuovi immagini vecchie (dangling) per liberare spazio
            docker image prune -f

            # Verifica che il container sia healthy
            sleep 5
            docker compose ps

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            curl --fail --silent http://localhost:5000/healthz \
              && echo "✅ Deploy OK" \
              || (echo "❌ Healthcheck fallito!" && exit 1)
