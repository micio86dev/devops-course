# .github/workflows/ci-cd.yml
#
# Pipeline CI/CD completa per Docker.
# Trigger:
#   • Push su main/master   → lint + test + build + push immagine + deploy
#   • Pull Request su main  → lint + test (no push, no deploy)
#
# Secret necessari nel repo GitHub:
#   • DEPLOY_HOSTS    — IP pubblici dei nodi app separati da virgola (es. 1.2.3.4,5.6.7.8)
#                       Ottenibili con: terraform output app_node_ips
#   • DEPLOY_USER     — utente SSH (root per Droplet DigitalOcean di default)
#   • DEPLOY_SSH_KEY  — chiave privata SSH (PEM) per accedere ai nodi

name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Permessi necessari per scrivere su GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/docker-todo

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — lint (fast, parallel con test)
  # Ruff (format + lint) + MyPy strict + Prettier check
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install Python lint dependencies
        run: pip install ruff mypy flask

      - name: Ruff format check
        run: ruff format --check app/

      - name: Ruff lint
        run: ruff check app/

      - name: MyPy strict
        run: mypy app/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Prettier check
        run: >
          npx prettier --check
          "app/templates/**"
          "*.{json,yml,yaml,md}"
          ".github/**/*.{yml,yaml}"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — test (parallel con lint)
  # Suite completa: unit + integration + api + e2e con coverage enforcement
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            app/requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt -r requirements-test.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run full test suite with coverage enforcement
        env:
          DATABASE_PATH: /tmp/test.db
        run: pytest --cov-fail-under=100

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — build & push dell'immagine Docker
  # Gira solo su push a main (non su PR), richiede lint + test verdi.
  # ────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' # ← skip sulle PR

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Imposta QEMU per build multi-arch (arm64 + amd64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx: il builder avanzato di Docker (multi-arch, cache, ecc.)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login su GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # token automatico, nessun secret manuale

      # Genera tag e labels automatici:
      #   • :latest   su ogni push a main
      #   • :sha-XXXXX  (primo commit SHA)
      #   • :v1.2.3   se esiste un tag Git
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      # Build multi-arch e push su GHCR
      # Il cache da/verso GHCR evita di ricompilare layer non modificati
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — deploy su tutti i nodi app via SSH
  # Gira solo dopo build-push riuscito.
  # DEPLOY_HOSTS: IP pubblici dei nodi (comma-separated).
  # appleboy/ssh-action li esegue in parallelo su tutti gli host.
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production # richiede approvazione manuale se configurato

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Copia i file compose su tutti i nodi prima del deploy.
      # Garantisce che ~/docker-todo/ contenga sempre la versione corrente.
      - name: Copy compose files to production nodes
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOSTS }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml"
          target: "/root/docker-todo"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOSTS }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            # Vai nella directory del progetto sul server
            cd /root/docker-todo

            # Carica REDIS_URL dal file scritto dal cloud-init (Valkey URI)
            # Il file e' 600 (solo root) e non entra mai in git o nell'immagine
            [ -f .env.valkey ] && export $(cat .env.valkey | xargs)

            # Scarica l'immagine aggiornata dal registry
            docker pull ghcr.io/${{ github.repository }}/docker-todo:latest

            # Riavvia con zero downtime (rolling update)
            IMAGE_TAG=latest \
            GITHUB_REPOSITORY=${{ github.repository }} \
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --no-build

            # Rimuovi immagini vecchie (dangling) per liberare spazio
            docker image prune -f

            # Verifica che il container sia healthy
            sleep 5
            docker compose ps

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOSTS }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Porta 5001: mappatura host del container (5001:5000)
            curl --fail --silent http://localhost:5001/healthz \
              && echo "✅ Deploy OK" \
              || (echo "❌ Healthcheck fallito!" && exit 1)
