#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - ufw

runcmd:
  # Installa Docker con lo script ufficiale
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable --now docker

  # Configura il firewall del sistema operativo
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw --force enable

  # Scarica e avvia il container con la nostra app
  - docker run -d --name todo-app --restart unless-stopped -p 80:8000 ${docker_image}
