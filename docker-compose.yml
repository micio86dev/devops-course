# docker-compose.yml  ─  configurazione BASE condivisa tra tutti gli ambienti
#
# NON contiene: bind mount del codice, immagine specifica, debug flags.
# Caricato automaticamente da tutti i compose command.
# Per sviluppo locale: si combina con docker-compose.override.yml (automatico).
# Per produzione:      si combina con docker-compose.prod.yml (esplicito in CI/CD).

services:
  app:
    environment:
      DATABASE_PATH: /data/todos.db
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
