# docker-compose.prod.yml  ─  override per produzione
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# In CI/CD questo file viene usato dopo il push dell'immagine su GHCR.
# L'immagine viene presa dal registry (non buildata localmente).

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/docker-todo:${IMAGE_TAG:-latest}
    container_name: docker-todo-prod
    restart: always
    environment:
      FLASK_DEBUG: "0"
      DATABASE_PATH: /data/todos.db
    volumes:
      - todo-data:/data
    # Nessun bind mount del codice in produzione!
    command:
      - gunicorn
      - --bind=0.0.0.0:5000
      - --workers=4
      - --timeout=30
      - --access-logfile=-
      - --error-logfile=-
      - app:app
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  todo-data:
