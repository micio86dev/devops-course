# docker-compose.prod.yml  ─  override produzione
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# In CI/CD questo file viene usato dopo il push dell'immagine su GHCR.
# L'immagine viene presa dal registry (non buildata localmente).
# GITHUB_REPOSITORY e IMAGE_TAG vengono iniettati dal workflow.
# REDIS_URL viene letta da /root/docker-todo/.env.valkey (scritto dal cloud-init).

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/docker-todo:${IMAGE_TAG:-latest}
    container_name: docker-todo-prod
    restart: always
    ports:
      - "5001:5000"
    environment:
      FLASK_DEBUG: "0"
      REDIS_URL: ${REDIS_URL:-} # Valkey URI; app non lo usa (demo infrastrutturale)
    volumes:
      - /mnt/todo-data:/data # NFS montato dal cloud-init; nessun bind mount del codice
    command:
      - gunicorn
      - --bind=0.0.0.0:5000
      - --workers=4
      - --timeout=30
      - --access-logfile=-
      - --error-logfile=-
      - app:app
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
